spec:
  # Declare component context fields used in interpolation
  component: [version]
  inputs:
    api-key:
      type: string
      default: ''
      description: 'ASD API key with cicd:provision scope'
    interface:
      type: string
      default: 'ttyd'
      description: 'Interface type: ttyd (web terminal) or codeserver (VS Code)'
    shell:
      type: string
      default: 'bash'
      description: 'Shell: bash, zsh'
    username:
      type: string
      default: 'asd'
      description: 'Basic auth username'
    password:
      type: string
      default: ''
      description: 'Basic auth password (auto-generated if empty)'
    tunnel-name:
      type: string
      default: ''
      description: 'Subdomain prefix (default: short commit SHA)'
    tunnel-host:
      type: string
      default: ''
      description: 'Tunnel server hostname (auto-detected from API)'
    tunnel-port:
      type: string
      default: ''
      description: 'Tunnel server SSH port (auto-detected from API)'
    region:
      type: string
      default: ''
      description: 'Tunnel server region'
    ttl-minutes:
      type: string
      default: '0'
      description: 'Token TTL in minutes (0 = no expiry, API key mode only)'
    asd-version:
      type: string
      default: 'latest'
      description: 'ASD CLI release tag'
    api-endpoint:
      type: string
      default: 'https://api.asd.host'
      description: 'ASD API endpoint'
    client-id:
      type: string
      default: ''
      description: 'Pre-existing ASD client ID (skips provisioning if provided with client-secret)'
    client-secret:
      type: string
      default: ''
      description: 'Pre-existing ASD client secret'
    direct:
      type: string
      default: 'false'
      description: 'Use --direct flag for asd expose (bypass Caddy proxy)'
    stage:
      type: string
      default: 'deploy'
      description: 'Pipeline stage for the DevInCi job'
    component-path:
      type: string
      default: 'asd-engineering/asd-devinci'
      description: 'GitLab project path for the component repo (override for forks)'
---
dev-environment:
  stage: $[[ inputs.stage ]]
  image: ubuntu:22.04
  variables:
    ASD_VERSION: $[[ inputs.asd-version ]]
    ASD_API_KEY: $[[ inputs.api-key ]]
    ASD_ENDPOINT: $[[ inputs.api-endpoint ]]
    ASD_TUNNEL_HOST: $[[ inputs.tunnel-host ]]
    ASD_TUNNEL_PORT: $[[ inputs.tunnel-port ]]
    INTERFACE_TYPE: $[[ inputs.interface ]]
    SESSION_USERNAME: $[[ inputs.username ]]
    SESSION_PASSWORD: $[[ inputs.password ]]
    SESSION_SHELL: $[[ inputs.shell ]]
    TUNNEL_NAME: $[[ inputs.tunnel-name ]]
    REGION: $[[ inputs.region ]]
    TTL_MINUTES: $[[ inputs.ttl-minutes ]]
    INPUT_CLIENT_ID: $[[ inputs.client-id ]]
    INPUT_CLIENT_SECRET: $[[ inputs.client-secret ]]
    DIRECT_MODE: $[[ inputs.direct ]]
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq git openssl
    - |
      git clone --depth 1 --branch "$[[ component.version ]]" \
        "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/$[[ inputs.component-path ]].git" /tmp/devinci
    - export SCRIPTS_DIR=/tmp/devinci/scripts
  script:
    # All scripts must be sourced (not bash-invoked) so that exports from
    # ci_set_env / ci_add_path persist across scripts in the same shell.
    - source "${SCRIPTS_DIR}/setup.sh"
    - source "${SCRIPTS_DIR}/provision.sh"
    - source "${SCRIPTS_DIR}/start-interface.sh"
    - source "${SCRIPTS_DIR}/connect.sh"
  environment:
    name: devinci/$[[ inputs.tunnel-name ]]
    url: "${TUNNEL_URL}"
  artifacts:
    reports:
      dotenv: devinci.env
    paths:
      - workspace/tunnel-url.txt
      - workspace/summary.md
