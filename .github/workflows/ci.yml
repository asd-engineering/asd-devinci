name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: shellcheck --severity=warning scripts/*.sh scripts/lib/*.sh
      - name: Validate action.yml
        run: |
          python3 -c "import yaml, sys; yaml.safe_load(open('action.yml'))"
      - name: Validate GitLab component
        run: |
          python3 -c "import yaml, sys; list(yaml.safe_load_all(open('templates/dev-environment.yml')))"
