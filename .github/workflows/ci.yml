name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: shellcheck scripts/*.sh
      - name: Validate action.yml
        run: |
          python3 -c "import yaml, sys; yaml.safe_load(open('action.yml'))"
