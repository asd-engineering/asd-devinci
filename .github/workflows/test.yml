name: Test DevInCi Action

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run full E2E tests (requires API key)'
        type: boolean
        default: false

jobs:
  # Integration tests against production API
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration tests against prod
        env:
          ASD_TEST_API_KEY: ${{ secrets.ASD_TEST_API_KEY }}
        run: |
          chmod +x tests/integration/prod-api.test.sh
          tests/integration/prod-api.test.sh

  # Test ephemeral mode (no API key required)
  test-ephemeral-mode:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test DevInCi (ephemeral mode)
        id: devinci
        uses: ./
        with:
          interface: ttyd
          tunnel-name: ephemeral-${{ github.run_id }}
          keep-alive: false

      - name: Verify ephemeral outputs
        run: |
          echo "Testing ephemeral mode outputs..."

          # Verify outputs are set
          [ -n "${{ steps.devinci.outputs.url }}" ] || { echo "ERROR: url output is empty"; exit 1; }
          [ -n "${{ steps.devinci.outputs.url-base }}" ] || { echo "ERROR: url-base output is empty"; exit 1; }
          [ -n "${{ steps.devinci.outputs.tunnel-user }}" ] || { echo "ERROR: tunnel-user output is empty"; exit 1; }
          [ -n "${{ steps.devinci.outputs.local-port }}" ] || { echo "ERROR: local-port output is empty"; exit 1; }
          [ -n "${{ steps.devinci.outputs.expires-at }}" ] || { echo "ERROR: expires-at output is empty"; exit 1; }

          echo "All outputs verified:"
          echo "  url: (set)"
          echo "  url-base: ${{ steps.devinci.outputs.url-base }}"
          echo "  tunnel-user: ${{ steps.devinci.outputs.tunnel-user }}"
          echo "  local-port: ${{ steps.devinci.outputs.local-port }}"
          echo "  expires-at: ${{ steps.devinci.outputs.expires-at }}"

  # Test API key mode (requires secret)
  test-api-key-mode:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test DevInCi (API key mode)
        id: devinci
        uses: ./
        with:
          api-key: ${{ secrets.ASD_TEST_API_KEY }}
          interface: ttyd
          tunnel-name: apikey-${{ github.run_id }}
          ttl-minutes: 5
          keep-alive: false

      - name: Verify API key outputs
        run: |
          echo "Testing API key mode outputs..."

          # Verify outputs
          [ -n "${{ steps.devinci.outputs.url }}" ] || { echo "ERROR: url output is empty"; exit 1; }
          [ -n "${{ steps.devinci.outputs.tunnel-user }}" ] || { echo "ERROR: tunnel-user output is empty"; exit 1; }

          # Validate tunnel_user format (5 alphanumeric chars)
          TUNNEL_USER="${{ steps.devinci.outputs.tunnel-user }}"
          if ! echo "$TUNNEL_USER" | grep -qE '^[a-z0-9]{5}$'; then
            echo "ERROR: Invalid tunnel-user format: $TUNNEL_USER"
            exit 1
          fi

          echo "All outputs verified for API key mode"

      - name: Test tunnel URL accessibility
        run: |
          # Verify URL is accessible (should get 401 without auth, 200 with auth embedded)
          FULL_URL="${{ steps.devinci.outputs.url }}"
          BASE_URL="${{ steps.devinci.outputs.url-base }}"

          echo "Testing URL accessibility..."
          echo "  Full URL: (with credentials)"
          echo "  Base URL: $BASE_URL"

          # Test base URL (should get 401 unauthorized)
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' "$BASE_URL" --max-time 10 2>/dev/null || echo "000")
          echo "  Base URL response: $HTTP_CODE"

          # Test full URL with credentials (should get 200)
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' "$FULL_URL" --max-time 10 2>/dev/null || echo "000")
          echo "  Full URL response: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Tunnel is accessible with credentials"
          else
            echo "Warning: Tunnel returned $HTTP_CODE (may still be initializing)"
          fi

  # Test code-server interface
  test-codeserver:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test DevInCi (code-server)
        id: devinci
        uses: ./
        with:
          api-key: ${{ secrets.ASD_TEST_API_KEY }}
          interface: codeserver
          tunnel-name: vscode-${{ github.run_id }}
          ttl-minutes: 5
          keep-alive: false

      - name: Verify code-server outputs
        run: |
          [ -n "${{ steps.devinci.outputs.url }}" ] || { echo "ERROR: url is empty"; exit 1; }
          [ -n "${{ steps.devinci.outputs.tunnel-user }}" ] || { echo "ERROR: tunnel-user is empty"; exit 1; }
          echo "code-server test passed"

  # Test on macOS
  test-macos:
    runs-on: macos-latest
    needs: integration-tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test on macOS (ephemeral)
        id: devinci
        uses: ./
        with:
          interface: ttyd
          tunnel-name: macos-${{ github.run_id }}
          keep-alive: false

      - name: Verify macOS outputs
        run: |
          [ -n "${{ steps.devinci.outputs.url }}" ] || { echo "ERROR: url is empty"; exit 1; }
          [ -n "${{ steps.devinci.outputs.tunnel-user }}" ] || { echo "ERROR: tunnel-user is empty"; exit 1; }
          echo "macOS test passed"

  # Test on Windows
  test-windows:
    runs-on: windows-latest
    needs: integration-tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test on Windows (ephemeral)
        id: devinci
        uses: ./
        with:
          interface: ttyd
          shell: powershell
          tunnel-name: windows-${{ github.run_id }}
          keep-alive: false

      - name: Verify Windows outputs
        shell: pwsh
        run: |
          if (-not "${{ steps.devinci.outputs.url }}") { throw "url is empty" }
          if (-not "${{ steps.devinci.outputs.tunnel-user }}") { throw "tunnel-user is empty" }
          Write-Host "Windows test passed"

  # Summary job
  test-summary:
    runs-on: ubuntu-latest
    needs: [integration-tests, test-ephemeral-mode]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## DevInCi Action Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.integration-tests.result }}" = "success" ]; then
            echo "- Integration Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Integration Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test-ephemeral-mode.result }}" = "success" ]; then
            echo "- Ephemeral Mode Test: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Ephemeral Mode Test: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          # Fail if any required job failed
          if [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.test-ephemeral-mode.result }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Some tests failed!**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All tests passed!" >> $GITHUB_STEP_SUMMARY
