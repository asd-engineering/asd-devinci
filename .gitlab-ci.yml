variables:
  INTERFACE_TYPE:
    value: 'ttyd'
    description: 'Interface: ttyd (terminal) or codeserver (VS Code)'
    options:
      - ttyd
      - codeserver
  SESSION_SHELL:
    value: 'bash'
    description: 'Shell'
    options:
      - bash
      - zsh
  SESSION_USERNAME:
    value: 'asd'
    description: 'Username'
  SESSION_PASSWORD:
    value: 'devinci'
    description: 'Password'
  REGION:
    value: ''
    description: 'Tunnel server region (empty = auto)'
  ASD_VERSION:
    value: 'latest'
    description: 'ASD CLI version'

stages:
  - lint
  - test
  - release

shellcheck:
  stage: lint
  image: koalaman/shellcheck-alpine:stable
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - shellcheck --severity=warning scripts/*.sh scripts/lib/*.sh

validate-component:
  stage: lint
  image: python:3.11-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - pip install -q pyyaml
    - python3 -c "import yaml, sys; list(yaml.safe_load_all(open('templates/dev-environment.yml')))"

validate-gitlab-ci:
  stage: lint
  image: python:3.11-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - pip install -q pyyaml
    - python3 -c "import yaml, sys; yaml.safe_load(open('.gitlab-ci.yml'))"

# On-demand DevInCi session — mirrors GitHub devinci.yml using local scripts
devinci:
  stage: test
  image: ubuntu:22.04
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
  variables:
    ASD_ENDPOINT: https://api.asd.host
    TUNNEL_NAME: devinci-$CI_PIPELINE_ID
    TTL_MINUTES: '0'
    DIRECT_MODE: 'false'
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq git openssl
    - export SCRIPTS_DIR=$CI_PROJECT_DIR/scripts
  script:
    - source "${SCRIPTS_DIR}/setup.sh"
    - source "${SCRIPTS_DIR}/provision.sh"
    - source "${SCRIPTS_DIR}/start-interface.sh"
    - source "${SCRIPTS_DIR}/connect.sh"
  artifacts:
    reports:
      dotenv: devinci.env
    paths:
      - workspace/tunnel-url.txt
      - workspace/summary.md

# Publish to CI/CD Catalog on tagged releases
create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
  script:
    - echo "Creating release ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release ${CI_COMMIT_TAG} of ASD DevInCi component"
