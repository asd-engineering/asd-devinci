stages:
  - lint
  - release

shellcheck:
  stage: lint
  image: koalaman/shellcheck-alpine:stable
  script:
    - shellcheck --severity=warning scripts/*.sh scripts/lib/*.sh

validate-component:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install -q pyyaml
    - python3 -c "import yaml, sys; list(yaml.safe_load_all(open('templates/dev-environment.yml')))"

validate-gitlab-ci:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install -q pyyaml
    - python3 -c "import yaml, sys; yaml.safe_load(open('.gitlab-ci.yml'))"

# Publish to CI/CD Catalog on tagged releases
create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
  script:
    - echo "Creating release ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release ${CI_COMMIT_TAG} of ASD DevInCi component"
