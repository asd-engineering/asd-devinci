name: 'DeVinci Cloud IDE'
description: 'Launch a full development environment in CI with browser access via ASD tunnels'
branding:
  icon: 'monitor'
  color: 'blue'

inputs:
  asd-api-key:
    description: 'ASD API key for tunnel credential generation (use ${{ secrets.ASD_API_KEY }})'
    required: true
  username:
    description: 'Basic auth username for ttyd and code-server'
    required: true
  password:
    description: 'Basic auth password'
    required: true
  asd-version:
    description: 'ASD CLI version to install'
    required: false
    default: 'latest'
  asd-command:
    description: 'ASD automation command to run (reads from project asd.yaml)'
    required: false
    default: 'asd run dev'
  tunnel-name:
    description: 'Custom tunnel name (auto-generated from SHA if empty)'
    required: false
    default: ''
  tunnel-host:
    description: 'ASD tunnel server host'
    required: false
    default: 'cicd.eu1.asd.engineer'
  tunnel-port:
    description: 'ASD tunnel server SSH port'
    required: false
    default: '2223'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'

outputs:
  tunnel-url:
    description: 'Base tunnel URL for the environment'
    value: ${{ steps.tunnel.outputs.url }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Install ASD CLI
      run: ${{ github.action_path }}/scripts/install-asd.sh
      shell: bash
      env:
        ASD_VERSION: ${{ inputs.asd-version }}
        GH_TOKEN: ${{ github.token }}

    - name: Setup tunnel credentials
      id: tunnel
      run: ${{ github.action_path }}/scripts/setup-tunnel.sh
      shell: bash
      env:
        ASD_API_KEY: ${{ inputs.asd-api-key }}
        TUNNEL_NAME: ${{ inputs.tunnel-name }}
        TUNNEL_HOST: ${{ inputs.tunnel-host }}
        TUNNEL_PORT: ${{ inputs.tunnel-port }}
        GITHUB_SHA: ${{ github.sha }}

    - name: Set auth environment
      run: |
        echo "TTYD_USERNAME=${{ inputs.username }}" >> $GITHUB_ENV
        echo "TTYD_PASSWORD=${{ inputs.password }}" >> $GITHUB_ENV
        echo "CODE_PASSWORD=${{ inputs.password }}" >> $GITHUB_ENV
      shell: bash

    - name: Run development environment
      run: ${{ inputs.asd-command }}
      shell: bash

    - name: Display access URLs
      run: |
        echo "========================================="
        echo "  DeVinci Cloud IDE is running!"
        echo "========================================="
        echo ""
        echo "  Check ASD Hub for all service URLs"
        echo ""
        echo "========================================="
        asd hub url || true
        asd net list || true
      shell: bash

    - name: Keep alive
      run: ${{ github.action_path }}/scripts/keep-alive.sh
      shell: bash
